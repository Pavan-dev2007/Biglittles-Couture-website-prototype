<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Biglittles Couture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            light: "#F5EDD6", DEFAULT: "#C9A84C", dark: "#1A1A1A",
                        },
                        accent: "#D4A0A0"
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primary-light text-primary-dark font-sans antialiased w-full m-0 p-0 overflow-x-hidden">
    <!-- Navbar (Solid mode for inner pages) -->
    <nav class="w-full fixed top-0 z-50 px-6 py-4 flex justify-between items-center glass-nav-light transition-all duration-300">
        <div class="flex items-center space-x-6 z-20">
            <a href="index.html" class="text-primary-dark hover:text-primary transition-colors cursor-pointer text-sm font-medium tracking-widest uppercase flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Back
            </a>
        </div>
        <div class="absolute left-1/2 transform -translate-x-1/2 z-10">
            <a href="index.html" class="text-3xl font-serif text-primary-dark hover:text-primary transition-colors uppercase tracking-[0.2em]">
                Biglittles
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-h-screen w-full flex flex-col px-6 py-32 md:px-24">
        <h1 class="text-4xl md:text-5xl font-serif tracking-widest uppercase text-center mb-8 fade-in-section">Our Collections</h1>
        
        <!-- Filters -->
        <div class="flex justify-center flex-wrap gap-8 mb-16 fade-in-section" style="transition-delay: 200ms;">
            <button class="font-medium tracking-widest uppercase text-sm border-b border-primary-dark pb-1 hover:text-primary transition-colors">All</button>
            <button class="font-medium tracking-widest uppercase text-sm text-primary-dark/50 hover:text-primary transition-colors">Bridal Lehengas</button>
            <button class="font-medium tracking-widest uppercase text-sm text-primary-dark/50 hover:text-primary transition-colors">Sarees</button>
            <button class="font-medium tracking-widest uppercase text-sm text-primary-dark/50 hover:text-primary transition-colors">Menswear</button>
        </div>

        <!-- Masonry Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="aspect-[3/4] relative group overflow-hidden fade-in-section">
                <img src="https://placehold.co/800x1000/F5EDD6/1A1A1A?text=Luxury+Couture&font=playfair-display" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Item 1">
                <div class="absolute inset-0 bg-primary-dark/0 group-hover:bg-primary-dark/30 transition-colors duration-500"></div>
                <div class="absolute bottom-0 translate-y-full group-hover:translate-y-0 w-full p-6 text-center transition-transform duration-500 bg-primary-dark/70 backdrop-blur-md text-primary-light">
                    <p class="font-serif text-xl tracking-widest uppercase mb-2">The Zoya Lehenga</p>
                    <a href="book.html" class="text-xs uppercase tracking-widest border-b border-primary pb-1 hover:text-primary transition-colors">Inquire</a>
                </div>
            </div>
            
            <div class="aspect-[4/5] relative group overflow-hidden fade-in-section" style="transition-delay: 100ms;">
                <img src="https://placehold.co/800x1000/F5EDD6/1A1A1A?text=Luxury+Couture&font=playfair-display" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Item 2">
                <div class="absolute bottom-0 translate-y-full group-hover:translate-y-0 w-full p-6 text-center transition-transform duration-500 bg-primary-dark/70 backdrop-blur-md text-primary-light">
                    <p class="font-serif text-xl tracking-widest uppercase mb-2">Ivory Silk Saree</p>
                    <a href="book.html" class="text-xs uppercase tracking-widest border-b border-primary pb-1 hover:text-primary transition-colors">Inquire</a>
                </div>
            </div>
            <!-- More items can be added natively... -->
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
